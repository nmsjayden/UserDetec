<title>TM Detector</title>
<script>
// ─── BASELINE SNAPSHOTS (must run before any extension code) ─────
(function() {
  window.__BASELINE__ = {};
  const snap = (ns, key, fn) => {
    try { const v = fn(); window.__BASELINE__[ns+'.'+key] = v; } catch(e) {}
  };

  // Snapshot native toString of every function we care about
  const fns = {
    'console.log':   ()=>console.log,
    'console.warn':  ()=>console.warn,
    'console.error': ()=>console.error,
    'console.info':  ()=>console.info,
    'console.debug': ()=>console.debug,
    'console.table': ()=>console.table,
    'console.group': ()=>console.group,
    'console.groupEnd':()=>console.groupEnd,
    'console.clear': ()=>console.clear,
    'console.time':  ()=>console.time,
    'console.timeEnd':()=>console.timeEnd,
    'console.count': ()=>console.count,
    'console.trace': ()=>console.trace,
    'window.fetch':       ()=>window.fetch,
    'window.open':        ()=>window.open,
    'window.close':       ()=>window.close,
    'window.alert':       ()=>window.alert,
    'window.confirm':     ()=>window.confirm,
    'window.prompt':      ()=>window.prompt,
    'window.postMessage': ()=>window.postMessage,
    'window.setTimeout':  ()=>window.setTimeout,
    'window.setInterval': ()=>window.setInterval,
    'window.clearTimeout':()=>window.clearTimeout,
    'window.clearInterval':()=>window.clearInterval,
    'window.requestAnimationFrame':()=>window.requestAnimationFrame,
    'window.eval':        ()=>window.eval,
    'window.atob':        ()=>window.atob,
    'window.btoa':        ()=>window.btoa,
    'window.queueMicrotask':()=>window.queueMicrotask,
    'window.performance.now':()=>performance.now,
    'JSON.parse':         ()=>JSON.parse,
    'JSON.stringify':     ()=>JSON.stringify,
    'Object.defineProperty':()=>Object.defineProperty,
    'Object.getOwnPropertyDescriptor':()=>Object.getOwnPropertyDescriptor,
    'Object.assign':      ()=>Object.assign,
    'Object.keys':        ()=>Object.keys,
    'Object.freeze':      ()=>Object.freeze,
    'Array.prototype.push':()=>Array.prototype.push,
    'Array.prototype.pop': ()=>Array.prototype.pop,
    'Array.prototype.splice':()=>Array.prototype.splice,
    'Array.prototype.map': ()=>Array.prototype.map,
    'Array.prototype.filter':()=>Array.prototype.filter,
    'Array.prototype.forEach':()=>Array.prototype.forEach,
    'Array.prototype.find':()=>Array.prototype.find,
    'Array.prototype.indexOf':()=>Array.prototype.indexOf,
    'Array.prototype.includes':()=>Array.prototype.includes,
    'Array.prototype.join':()=>Array.prototype.join,
    'Array.prototype.reduce':()=>Array.prototype.reduce,
    'Array.prototype.slice':()=>Array.prototype.slice,
    'Function.prototype.toString':()=>Function.prototype.toString,
    'Function.prototype.call':()=>Function.prototype.call,
    'Function.prototype.apply':()=>Function.prototype.apply,
    'Function.prototype.bind':()=>Function.prototype.bind,
    'String.prototype.replace':()=>String.prototype.replace,
    'String.prototype.split':()=>String.prototype.split,
    'String.prototype.indexOf':()=>String.prototype.indexOf,
    'String.prototype.includes':()=>String.prototype.includes,
    'String.prototype.trim':()=>String.prototype.trim,
    'XMLHttpRequest.prototype.open':()=>XMLHttpRequest.prototype.open,
    'XMLHttpRequest.prototype.send':()=>XMLHttpRequest.prototype.send,
    'XMLHttpRequest.prototype.setRequestHeader':()=>XMLHttpRequest.prototype.setRequestHeader,
    'Storage.prototype.setItem':()=>Storage.prototype.setItem,
    'Storage.prototype.getItem':()=>Storage.prototype.getItem,
    'Storage.prototype.removeItem':()=>Storage.prototype.removeItem,
    'EventTarget.prototype.addEventListener':()=>EventTarget.prototype.addEventListener,
    'EventTarget.prototype.removeEventListener':()=>EventTarget.prototype.removeEventListener,
    'EventTarget.prototype.dispatchEvent':()=>EventTarget.prototype.dispatchEvent,
    'Node.prototype.appendChild':()=>Node.prototype.appendChild,
    'Node.prototype.removeChild':()=>Node.prototype.removeChild,
    'Node.prototype.insertBefore':()=>Node.prototype.insertBefore,
    'Element.prototype.setAttribute':()=>Element.prototype.setAttribute,
    'Element.prototype.getAttribute':()=>Element.prototype.getAttribute,
    'Element.prototype.querySelector':()=>Element.prototype.querySelector,
    'Element.prototype.querySelectorAll':()=>Element.prototype.querySelectorAll,
    'Document.prototype.createElement':()=>document.createElement,
    'Document.prototype.getElementById':()=>document.getElementById,
    'Document.prototype.querySelector':()=>document.querySelector,
    'MutationObserver':   ()=>window.MutationObserver,
    'IntersectionObserver':()=>window.IntersectionObserver,
    'Promise.then':       ()=>Promise.prototype.then,
    'Promise.catch':      ()=>Promise.prototype.catch,
    'Symbol.hasInstance': ()=>Symbol,
    'Proxy':              ()=>window.Proxy,
    'Reflect.apply':      ()=>Reflect && Reflect.apply,
  };

  for (const [key, fn] of Object.entries(fns)) {
    try {
      const v = fn();
      if (v == null) { window.__BASELINE__[key] = '__null__'; continue; }
      window.__BASELINE__[key] = {
        ref: v,
        str: Function.prototype.toString.call(v),
        isNative: Function.prototype.toString.call(v).includes('[native code]')
      };
    } catch(e) {
      window.__BASELINE__[key] = '__error__';
    }
  }
  window.__BASELINE__['__taken__'] = performance.now();
})();

// ─── INTERCEPTOR LOGGING ─────────────────────────────────────────
(function() {
  window.__LOG__ = [];
  const push = (type, msg, ext) => {
    const entry = { t: performance.now().toFixed(1), type, msg, ext: !!ext };
    window.__LOG__.push(entry);
    if (window.__LOG__.length > 300) window.__LOG__.shift();
    window.dispatchEvent(new CustomEvent('__log__', { detail: entry }));
  };
  const safe = (v, n=120) => { try { if (v===undefined) return 'undefined'; if (v===null) return 'null'; if (typeof v==='function') return `[fn:${v.name||'?'}]`; const s = typeof v==='string'?v:JSON.stringify(v); return s.length>n?s.slice(0,n)+'…':s; } catch { return String(v); } };
  const isExt = () => { try { const s=new Error().stack||''; return s.includes('chrome-extension://')||s.includes('moz-extension://'); } catch{return false;} };
  const _con = {};
  ['log','warn','error','info','debug'].forEach(m => {
    _con[m] = console[m].bind(console);
    console[m] = function(...a) { push('console', `console.${m}(${a.map(x=>safe(x)).join(', ')})`, isExt()); return _con[m](...a); };
  });
  window.__orig_console__ = _con;
  const _fetch = window.fetch.bind(window);
  window.fetch = function(input, init) {
    const url = typeof input==='string'?input:(input?.url||'?'), method = init?.method||'GET';
    push('network', `fetch ${method} ${url}`, isExt());
    return _fetch(input, init).then(r => { push('network', `fetch ${r.status} ← ${url}`); return r; }).catch(e => { push('network', `fetch ERR ${url}: ${e.message}`); throw e; });
  };
  const _open = XMLHttpRequest.prototype.open, _send = XMLHttpRequest.prototype.send;
  XMLHttpRequest.prototype.open = function(m, url) { this.__u__=url; this.__m__=m; return _open.apply(this,arguments); };
  XMLHttpRequest.prototype.send = function(body) {
    const u=this.__u__||'?', m=this.__m__||'?';
    push('network', `XHR ${m} ${u}${body?` [${safe(body,40)}]`:''}`, isExt());
    this.addEventListener('load', () => push('network', `XHR ${this.status} ← ${u}`));
    return _send.apply(this,arguments);
  };
  const _lsSet = Storage.prototype.setItem, _lsGet = Storage.prototype.getItem;
  Storage.prototype.setItem = function(k,v) { push('storage', `${this===sessionStorage?'session':'local'}Storage.set("${safe(k,40)}", ${safe(v,60)})`, isExt()); return _lsSet.call(this,k,v); };
  Storage.prototype.getItem = function(k) { const v=_lsGet.call(this,k); push('storage', `${this===sessionStorage?'session':'local'}Storage.get("${safe(k,40)}") → ${safe(v,60)}`, isExt()); return v; };
  const cookieDesc = Object.getOwnPropertyDescriptor(Document.prototype,'cookie') || Object.getOwnPropertyDescriptor(HTMLDocument.prototype,'cookie');
  if (cookieDesc) Object.defineProperty(document,'cookie',{ get(){return cookieDesc.get.call(this);}, set(v){push('storage',`document.cookie = ${safe(v,80)}`,isExt()); return cookieDesc.set.call(this,v);}, configurable:true });
  ['GM_info','GM_setValue','GM_getValue','GM_xmlhttpRequest','GM_notification','GM_openInTab','GM_addStyle','GM_registerMenuCommand','GM_log','GM_download','GM_cookie','unsafeWindow','GM','exportFunction'].forEach(name => {
    let _v = window[name];
    Object.defineProperty(window, name, { get() { if(_v!==undefined) push('gm', `window.${name} accessed (${typeof _v})`); return _v; }, set(v) { push('gm', `window.${name} = ${safe(v,60)}`); _v=v; }, configurable:true });
  });
  const _sto = window.setTimeout, _siv = window.setInterval;
  window.setTimeout = function(fn, delay, ...a) { push('timers', `setTimeout(delay=${delay}, fn=${safe(fn,60)})`, isExt()); return _sto.call(window,fn,delay,...a); };
  window.setInterval = function(fn, delay, ...a) { push('timers', `setInterval(delay=${delay}, fn=${safe(fn,60)})`, isExt()); return _siv.call(window,fn,delay,...a); };
  const _ae = EventTarget.prototype.addEventListener;
  EventTarget.prototype.addEventListener = function(type, fn, opts) {
    const target = this===window?'window':this===document?'document':(this.tagName?`<${this.tagName.toLowerCase()}>`:'?');
    push('events', `${target}.on("${type}", ${typeof fn==='function'?fn.name||'anon':'?'})`, isExt());
    return _ae.call(this,type,fn,opts);
  };
  const _ce = document.createElement.bind(document);
  document.createElement = function(tag,...a) {
    const ext = isExt();
    if (ext || ['script','iframe','link'].includes(tag.toLowerCase())) push('dom', `createElement(${tag.toUpperCase()})`, ext);
    return _ce(tag,...a);
  };
  const _ps = history.pushState.bind(history), _rs = history.replaceState.bind(history);
  history.pushState = function(s,t,url) { push('nav', `pushState → ${url}`); return _ps(s,t,url); };
  history.replaceState = function(s,t,url) { push('nav', `replaceState → ${url}`); return _rs(s,t,url); };
  const _eval = window.eval;
  window.eval = function(code) { push('eval', `eval(${safe(code,80)})`); return _eval(code); };
  Object.defineProperty(window.eval,'toString',{value:()=>'function eval() { [native code] }'});
})();
</script>

@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap');

</style>

<h1>◈ TM DETECTOR</h1>
<div class="sub">ACTIVE INTERCEPTORS · FINGERPRINT SCAN · OVERWRITE ANALYSIS — v6.0</div>

<script>
// ─── OVERWRITE DETECTION HELPERS ────────────────────────────────
function checkOverwrite(key) {
  const base = window.__BASELINE__[key];
  if (!base || base === '__null__' || base === '__error__') return { found: false, detail: 'no baseline', severity: 'info' };

  let current, currentStr, currentIsNative;
  try {
    const parts = key.split('.');
    let obj = window;

    // Special resolution paths
    if (key.startsWith('console.')) { obj = console; current = console[parts[1]]; }
    else if (key.startsWith('Array.prototype.')) { current = Array.prototype[parts[2]]; }
    else if (key.startsWith('Function.prototype.')) { current = Function.prototype[parts[2]]; }
    else if (key.startsWith('String.prototype.')) { current = String.prototype[parts[2]]; }
    else if (key.startsWith('XMLHttpRequest.prototype.')) { current = XMLHttpRequest.prototype[parts[2]]; }
    else if (key.startsWith('Storage.prototype.')) { current = Storage.prototype[parts[2]]; }
    else if (key.startsWith('EventTarget.prototype.')) { current = EventTarget.prototype[parts[2]]; }
    else if (key.startsWith('Node.prototype.')) { current = Node.prototype[parts[2]]; }
    else if (key.startsWith('Element.prototype.')) { current = Element.prototype[parts[2]]; }
    else if (key.startsWith('Document.prototype.')) { current = document[parts[2]]; }
    else if (key.startsWith('Promise.')) { current = Promise.prototype[parts[1]]; }
    else if (key === 'window.performance.now') { current = performance.now; }
    else if (key.startsWith('JSON.')) { current = JSON[parts[1]]; }
    else if (key.startsWith('Object.')) { current = Object[parts[1]]; }
    else if (key.startsWith('Reflect.')) { current = Reflect && Reflect[parts[1]]; }
    else { current = window[parts[1]]; }

    currentStr = Function.prototype.toString.call(current);
    currentIsNative = currentStr.includes('[native code]');
  } catch(e) {
    return { found: true, detail: `error: ${e.message}`, severity: 'warn' };
  }

  // Reference identity check (fastest)
  if (current !== base.ref) {
    // Was native, now isn't → critical overwrite
    if (base.isNative && !currentIsNative) {
      return { found: true, detail: `native → WRAPPED fn`, severity: 'crit' };
    }
    // Was native, still claims native, but reference changed → spoofed toString
    if (base.isNative && currentIsNative && current !== base.ref) {
      return { found: true, detail: `ref changed (toString spoofed?)`, severity: 'crit' };
    }
    // Was non-native, changed to something else
    if (!base.isNative && current !== base.ref) {
      return { found: true, detail: `fn reference swapped`, severity: 'warn' };
    }
  }

  // toString content changed even if reference is same (proxy or defineProperty trick)
  if (currentStr !== base.str) {
    return { found: true, detail: `toString changed`, severity: 'warn' };
  }

  // Was native, now not native (shouldn't get here but belt+suspenders)
  if (base.isNative && !currentIsNative) {
    return { found: true, detail: `native → user code`, severity: 'crit' };
  }

  return { found: false, detail: 'native ✓', severity: 'clean' };
}

// ─── CHECK DEFINITIONS ──────────────────────────────────────────
const CHECKS = [
  { sec: 'OVERWRITTEN — CONSOLE', badge: 'CRITICAL', rows: [
    { id:'ow_cl',  name:'console.log',      fn:()=>checkOverwrite('console.log') },
    { id:'ow_cw',  name:'console.warn',     fn:()=>checkOverwrite('console.warn') },
    { id:'ow_ce',  name:'console.error',    fn:()=>checkOverwrite('console.error') },
    { id:'ow_ci',  name:'console.info',     fn:()=>checkOverwrite('console.info') },

    { id:'gm4',        name:'GM.xmlHttpRequest',    fn:()=>{ const g=chkGlobal('GM'); return {found:g.found&&typeof window.GM?.xmlHttpRequest==='function',detail:g.detail}; }},

    { id:'exportFn',   name:'exportFunction',       fn:()=>chkGlobal('exportFunction') },

  ]},
  { sec: 'DOM INJECTION', rows: [
    { id:'dom_tm',     name:'.tm-* class elements', fn:()=>domQ('[class*="tm-"]') },

    { id:'int_store',  name:'Storage ops seen',        fn:()=>intCount('storage') },
    { id:'int_timer',  name:'Timers registered',       fn:()=>intCount('timers') },
    { id:'int_eval',   name:'eval() calls',            fn:()=>intCount('eval') },

// ─── GENERIC HELPERS ────────────────────────────────────────────
const chkGlobal = name => { try { const v=window[name]; return v!=null?{found:true,detail:`${typeof v}`}:{found:false,detail:'–'}; } catch(e){return{found:false,detail:e.message};} };
const domQ = sel => { try { const n=document.querySelectorAll(sel).length; return n?{found:true,detail:`${n} el`}:{found:false,detail:'0'}; } catch(e){return{found:false,detail:e.message};} };
const extScripts = () => { for(const s of document.querySelectorAll('script[src]')){ const h=s.src; if(h.startsWith('chrome-extension://')||h.startsWith('moz-extension://')) return {found:true,detail:h.slice(0,50)}; } return {found:false,detail:'none'}; };
const extLinks   = () => { for(const l of document.querySelectorAll('link')){ const h=l.href||''; if(h.startsWith('chrome-extension://')||h.startsWith('moz-extension://')) return {found:true,detail:h.slice(0,50)}; } return {found:false,detail:'none'}; };
const highZ      = () => { for(const el of document.querySelectorAll('*')){ const cs=getComputedStyle(el); if(cs.position==='fixed'&&parseInt(cs.zIndex)>9000) return {found:true,detail:`${el.tagName} z=${cs.zIndex}`}; } return {found:false,detail:'none'}; };
const shadowRoots= () => { let c=0; for(const el of document.querySelectorAll('*')) if(el.shadowRoot) c++; return c?{found:true,detail:`${c} roots`}:{found:false,detail:'none'}; };
const extIframes  = () => { for(const f of document.querySelectorAll('iframe')){ const s=f.src||''; if(s.startsWith('chrome-extension://')||s.startsWith('moz-extension://')) return {found:true,detail:s.slice(0,50)}; } return {found:false,detail:'none'}; };
const storeKeys  = (store, ...pats) => { try { const k=Object.keys(store); const m=k.filter(k=>pats.some(p=>k.toLowerCase().includes(p))); return m.length?{found:true,detail:m.slice(0,3).join(', ')}:{found:false,detail:`${k.length} keys`}; } catch(e){return{found:false,detail:e.message};} };
const idbChk     = () => new Promise(res=>{ try { const r=indexedDB.databases?.(); if(r) r.then(dbs=>{ const t=dbs.filter(d=>d.name&&(d.name.toLowerCase().includes('tamper')||d.name.toLowerCase().includes('grease'))); res(t.length?{found:true,detail:t.map(d=>d.name).join(', ')}:{found:false,detail:`${dbs.length} dbs`}); }).catch(()=>res({found:false,detail:'no access'})); else res({found:false,detail:'n/a'}); } catch(e){res({found:false,detail:e.message});} });
const intCount   = type => { const c=window.__LOG__.filter(l=>l.type===type).length; return {found:c>0,detail:`${c} calls`}; };
const extOriginCalls = () => { const c=window.__LOG__.filter(l=>l.ext).length; return c?{found:true,detail:`${c} ext calls`}:{found:false,detail:'0'}; };
const extCreateEl    = () => { const c=window.__LOG__.filter(l=>l.type==='dom'&&l.ext).length; return c?{found:true,detail:`${c} ext elements`}:{found:false,detail:'0'}; };

// Severity for non-overwrite sections (found = bad)
const defaultSeverity = id => {
  if(id.startsWith('gm_')||id==='unsafe'||id==='exportFn') return 'crit';
  if(id.startsWith('dom_ext')||id.startsWith('int_ext')||id==='int_eval') return 'crit';
  return 'warn';
};

// ─── INTERCEPT FEED ─────────────────────────────────────────────
const CHANS = ['overwrite','console','network','storage','gm','timers','events','dom','nav','eval'];
const chanCounts = {};
CHANS.forEach(c => chanCounts[c] = 0);
let activeTab = 'overwrite', filterText = '';

const tabsEl = document.getElementById('tabs');
const feedsEl = document.getElementById('feeds');
CHANS.forEach(ch => {
  const tab = document.createElement('button');
  tab.className = 'tab' + (ch === activeTab ? ' on' : '');
  tab.dataset.ch = ch;
  tab.innerHTML = `${ch.toUpperCase()}<span class="ct" id="ct-${ch}">0</span>`;
  tab.onclick = () => switchTab(ch);
  tabsEl.appendChild(tab);
  const feed = document.createElement('div');
  feed.className = 'feed' + (ch === activeTab ? ' on' : '');
  feed.id = 'feed-' + ch;
  feedsEl.appendChild(feed);
});

function switchTab(ch) {
  activeTab = ch;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.ch === ch));
  document.querySelectorAll('.feed').forEach(f => f.classList.toggle('on', f.id === 'feed-'+ch));
}

let totalIntercepts = 0;
function addFeedRow(entry) {
  totalIntercepts++;
  document.getElementById('total-int').textContent = totalIntercepts;
  const ch = entry.type;
  if (!CHANS.includes(ch)) return;
  chanCounts[ch] = (chanCounts[ch]||0)+1;
  const ctEl = document.getElementById('ct-'+ch);
  if (ctEl) ctEl.textContent = chanCounts[ch] > 99 ? '99+' : chanCounts[ch];
  if (filterText && !entry.msg.toLowerCase().includes(filterText)) return;
  const feed = document.getElementById('feed-'+ch);
  if (!feed) return;
  const subtype = ch==='console'?(entry.msg.includes('console.warn')?'warn':entry.msg.includes('console.error')?'error':''):'';
  const row = document.createElement('div');
  row.className = 'frow' + (entry.ext ? ' ext' : '');
  row.innerHTML = `<div class="fts">${parseFloat(entry.t).toFixed(0)}ms</div><div class="fmsg ${ch} ${subtype}">${escH(entry.msg)}</div>`;
  feed.appendChild(row);
  feed.scrollTop = feed.scrollHeight;
  while (feed.children.length > 200) feed.removeChild(feed.firstChild);
}
window.addEventListener('__log__', e => addFeedRow(e.detail));

// Emit overwrite events to the overwrite feed
function emitOverwrite(key, res) {
  const entry = { t: performance.now().toFixed(1), type: 'overwrite', msg: `[${res.severity.toUpperCase()}] ${key}: ${res.detail}`, ext: false };
  window.__LOG__.push(entry);
  addFeedRow(entry);
}

// ─── CHECKS UI ──────────────────────────────────────────────────
function buildChecks() {
  const el = document.getElementById('checks');
  el.innerHTML = '';
  CHECKS.forEach(sec => {
    const isOverwrite = sec.sec.startsWith('OVERWRITTEN');
    const div = document.createElement('div');
    div.className = 'section';
    const secId = sec.sec.replace(/[\s—]+/g,'-');
    div.innerHTML = `
      <div class="sec-head${isOverwrite?' warn-sec':''}">
        <span class="sec-title">${sec.sec}</span>
        <span class="sec-ct" id="sct-${secId}">0/${sec.rows.length}</span>
      </div>
      <div class="rows" id="sec-${secId}">
        ${sec.rows.map(r => rowHTML(r.id, r.name, 'p', '')).join('')}
      </div>`;
    el.appendChild(div);
  });
}

function rowHTML(id, name, state, detail, severity) {
  const isHit = state === 'h';
  const dotClass = state==='p'?'dot-p':state==='r'?'dot-r':isHit?(severity==='clean'?'dot-hg':'dot-h'):'dot-m';
  const detClass = isHit?(severity==='clean'?'hg':'h'):'m';
  return `<div class="row" id="row-${id}">
    <div class="dot ${dotClass}" id="dot-${id}"></div>
    <div class="rname">${escH(name)}</div>
    <div class="rdetail ${detClass}" id="det-${id}">${escH(detail)}</div>
  </div>`;
}

function updateRow(id, state, detail, severity) {
  const row = document.getElementById('row-'+id);
  const dot = document.getElementById('dot-'+id);
  const det = document.getElementById('det-'+id);
  if (!dot || !det || !row) return;
  const isHit = state === 'h';
  dot.className = 'dot ' + (state==='r'?'dot-r':state==='p'?'dot-p':isHit?(severity==='clean'?'dot-hg':'dot-h'):'dot-m');
  det.className = 'rdetail ' + (isHit?(severity==='clean'?'hg':'h'):'m');
  det.textContent = detail||'';
  if (isHit && severity !== 'clean') {
    row.classList.add('overwrite-hit');
  } else {
    row.classList.remove('overwrite-hit');
  }
}

function updateSecCount(secName) {
  const sec = CHECKS.find(s=>s.sec===secName);
  if (!sec) return;
  const found = sec.rows.filter(r => state.results[r.id]?.found).length;
  const id = secName.replace(/[\s—]+/g,'-');
  const el = document.getElementById('sct-'+id);
  if (el) el.textContent = `${found}/${sec.rows.length}`;
}

// ─── SCAN STATE ─────────────────────────────────────────────────
const state = { results:{}, running:false, watchObs:null, watchPoll:null };

async function runScan() {
  if (state.running) return;
  state.running = true;
  state.results = {};
  buildChecks();
  document.getElementById('summary').style.display = 'flex';
  let total=0, critCount=0, warnCount=0, cleanCount=0, done=0;
  const allRows = CHECKS.flatMap(s => s.rows.map(r=>({...r,sec:s.sec})));
  allRows.forEach(() => total++);
  setStatus(`scanning 0/${total}…`);
  setVerdict('wait');

  // Show baseline timestamp
  const bt = window.__BASELINE__['__taken__'];
  document.getElementById('s-baseline').textContent = bt ? `${bt.toFixed(0)}ms before page scripts` : 'unknown';

  for (const r of allRows) {
    updateRow(r.id,'r','…');
    let res;
    try { const raw=r.fn(); res = raw instanceof Promise ? await raw : raw; }
    catch(e) { res={found:false,detail:e.message,severity:'info'}; }

    // Normalise severity
    if (!res.severity) {
      res.severity = res.found ? defaultSeverity(r.id) : 'clean';
    }
    if (!res.found) res.severity = 'clean';

    state.results[r.id] = res;

    // Emit overwrite hits to the feed
    if (res.found && r.id.startsWith('ow_')) emitOverwrite(r.name, res);

    updateRow(r.id, res.found?'h':'m', res.detail||'', res.severity);
    updateSecCount(r.sec);
    done++;

    if (res.found) {
      if (res.severity === 'crit') critCount++;
      else if (res.severity === 'warn') warnCount++;
      else cleanCount++;
    } else {
      cleanCount++;
    }

    document.getElementById('s-crit').textContent = critCount;
    document.getElementById('s-warn').textContent = warnCount;
    document.getElementById('s-clean').textContent = cleanCount;
    document.getElementById('s-total').textContent = done;

    setStatus(`${done}/${total} — ${critCount} crit · ${warnCount} warn`);
    setVerdict(done < total ? 'wait' : critCount > 0 ? 'hit' : warnCount > 0 ? 'partial' : 'miss');
    await sleep(4);
  }
  setStatus(`complete — ${critCount} critical · ${warnCount} warnings · ${cleanCount} clean`);
  state.running = false;
}

function setStatus(s) { document.getElementById('status-text').textContent=s; }
function setVerdict(v) {
  const el=document.getElementById('verdict');
  if(v==='wait')    { el.className='verdict v-wait'; el.textContent='SCANNING…'; }
  else if(v==='hit'){ el.className='verdict v-hit'; el.textContent='⚡ OVERWRITES DETECTED'; }
  else if(v==='partial'){ el.className='verdict v-wait'; el.textContent='⚠ WARNINGS FOUND'; }
  else              { el.className='verdict v-miss'; el.textContent='✓ CLEAN'; }
}

// ─── LIVE WATCH ─────────────────────────────────────────────────
let watchOn=false;
function toggleWatch() {
  watchOn=!watchOn;
  const btn=document.getElementById('btn-watch');
  if(watchOn) {
    btn.textContent='◉ STOP WATCH'; btn.className='btn btn-r';
    // Poll for runtime overwrites that happen after page load
    state.watchPoll=setInterval(()=>{
      const owKeys = Object.keys(window.__BASELINE__).filter(k => k !== '__taken__');
      for (const key of owKeys) {
        const r = checkOverwrite(key);
        if (r.found) {
          const already = state._watchAlerted?.[key];
          if (!already) {
            state._watchAlerted = state._watchAlerted||{};
            state._watchAlerted[key]=true;
            const entry = { t: performance.now().toFixed(1), type:'overwrite', msg:`[RUNTIME] ${key} overwritten: ${r.detail}`, ext:false };
            window.__LOG__.push(entry);
            window.dispatchEvent(new CustomEvent('__log__',{detail:entry}));
          }
        }
      }
      // Also check for GM globals appearing
      ['GM_info','GM_setValue','GM_getValue','unsafeWindow'].forEach(g=>{
        if(window[g]!==undefined&&!state._seen?.[g]){
          state._seen=state._seen||{};state._seen[g]=1;
          window.__LOG__.push({t:performance.now().toFixed(1),type:'gm',msg:`APPEARED: window.${g}`,ext:false});
          window.dispatchEvent(new CustomEvent('__log__',{detail:window.__LOG__[window.__LOG__.length-1]}));
        }
      });
    },300);
    state.watchObs=new MutationObserver(muts=>{
      for(const m of muts) for(const n of m.addedNodes) if(n.nodeType===1) {
        const tag=n.tagName||'?', cls=String(n.className||''), id=n.id||'';
        if(['SCRIPT','IFRAME','LINK'].includes(tag)||cls.includes('tm-')||id.includes('tm-')) {
          const e={t:performance.now().toFixed(1),type:'dom',msg:`DOM inject: <${tag}${id?'#'+id:''}${cls?' .'+cls.split(' ')[0]:''}>`};
          window.__LOG__.push(e); window.dispatchEvent(new CustomEvent('__log__',{detail:e}));
        }
      }
    });
    state.watchObs.observe(document.documentElement,{childList:true,subtree:true});
  } else {
    btn.textContent='◉ LIVE WATCH'; btn.className='btn btn-g';
    state.watchObs?.disconnect(); clearInterval(state.watchPoll);
  }
}

// ─── CONTROLS ───────────────────────────────────────────────────
document.getElementById('btn-scan').onclick = runScan;
document.getElementById('btn-watch').onclick = toggleWatch;
document.getElementById('btn-reset').onclick = ()=>{
  if(state.running) return;
  if(watchOn) toggleWatch();
  state.results={}; state._watchAlerted={}; state._seen={};
  buildChecks();
  document.getElementById('summary').style.display = 'none';
  setStatus('ready'); setVerdict('wait');
};
document.getElementById('btn-clr').onclick = ()=>{
  CHANS.forEach(ch=>{ const f=document.getElementById('feed-'+ch); if(f) f.innerHTML=''; chanCounts[ch]=0; const c=document.getElementById('ct-'+ch); if(c) c.textContent='0'; });
  totalIntercepts=0; document.getElementById('total-int').textContent='0'; window.__LOG__=[];
};
document.getElementById('int-search').oninput = function() { filterText=this.value.toLowerCase(); };

const escH = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const sleep = ms => new Promise(r=>setTimeout(r,ms));

buildChecks();
window.__LOG__.forEach(addFeedRow);
</script>
