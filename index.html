<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TM Detector</title>
<script>
// Install interceptors IMMEDIATELY before anything else
(function() {
  window.__LOG__ = [];
  const push = (type, msg, ext) => {
    const entry = { t: performance.now().toFixed(1), type, msg, ext: !!ext };
    window.__LOG__.push(entry);
    if (window.__LOG__.length > 300) window.__LOG__.shift();
    window.dispatchEvent(new CustomEvent('__log__', { detail: entry }));
  };
  const safe = (v, n=120) => { try { if (v===undefined) return 'undefined'; if (v===null) return 'null'; if (typeof v==='function') return `[fn:${v.name||'?'}]`; const s = typeof v==='string'?v:JSON.stringify(v); return s.length>n?s.slice(0,n)+'…':s; } catch { return String(v); } };
  const isExt = () => { try { const s=new Error().stack||''; return s.includes('chrome-extension://')||s.includes('moz-extension://'); } catch{return false;} };

  // Console
  const _con = {};
  ['log','warn','error','info','debug'].forEach(m => {
    _con[m] = console[m].bind(console);
    console[m] = function(...a) {
      push('console', `console.${m}(${a.map(x=>safe(x)).join(', ')})`, isExt());
      return _con[m](...a);
    };
  });
  window.__orig_console__ = _con;

  // Fetch
  const _fetch = window.fetch.bind(window);
  window.fetch = function(input, init) {
    const url = typeof input==='string'?input:(input?.url||'?');
    const method = init?.method||'GET';
    push('network', `fetch ${method} ${url}`, isExt());
    return _fetch(input, init).then(r => { push('network', `fetch ${r.status} ← ${url}`); return r; }).catch(e => { push('network', `fetch ERR ${url}: ${e.message}`); throw e; });
  };

  // XHR
  const _open = XMLHttpRequest.prototype.open;
  const _send = XMLHttpRequest.prototype.send;
  XMLHttpRequest.prototype.open = function(m, url) { this.__u__=url; this.__m__=m; return _open.apply(this,arguments); };
  XMLHttpRequest.prototype.send = function(body) {
    const u=this.__u__||'?', m=this.__m__||'?';
    push('network', `XHR ${m} ${u}${body?` [${safe(body,40)}]`:''}`, isExt());
    this.addEventListener('load', () => push('network', `XHR ${this.status} ← ${u}`));
    return _send.apply(this,arguments);
  };

  // localStorage / sessionStorage
  const _lsSet = Storage.prototype.setItem;
  const _lsGet = Storage.prototype.getItem;
  Storage.prototype.setItem = function(k,v) { push('storage', `${this===sessionStorage?'session':'local'}Storage.set("${safe(k,40)}", ${safe(v,60)})`, isExt()); return _lsSet.call(this,k,v); };
  Storage.prototype.getItem = function(k) { const v=_lsGet.call(this,k); push('storage', `${this===sessionStorage?'session':'local'}Storage.get("${safe(k,40)}") → ${safe(v,60)}`, isExt()); return v; };

  // Cookie
  const cookieDesc = Object.getOwnPropertyDescriptor(Document.prototype,'cookie') || Object.getOwnPropertyDescriptor(HTMLDocument.prototype,'cookie');
  if (cookieDesc) Object.defineProperty(document,'cookie',{ get(){return cookieDesc.get.call(this);}, set(v){push('storage',`document.cookie = ${safe(v,80)}`,isExt()); return cookieDesc.set.call(this,v);}, configurable:true });

  // GM API traps
  ['GM_info','GM_setValue','GM_getValue','GM_xmlhttpRequest','GM_notification','GM_openInTab','GM_addStyle','GM_registerMenuCommand','GM_log','GM_download','GM_cookie','unsafeWindow','GM','exportFunction'].forEach(name => {
    let _v = window[name];
    Object.defineProperty(window, name, {
      get() { if(_v!==undefined) push('gm', `window.${name} accessed (${typeof _v})`); return _v; },
      set(v) { push('gm', `window.${name} = ${safe(v,60)}`); _v=v; },
      configurable:true
    });
  });

  // setTimeout / setInterval
  const _sto = window.setTimeout, _siv = window.setInterval;
  window.setTimeout = function(fn, delay, ...a) { push('timers', `setTimeout(delay=${delay}, fn=${safe(fn,60)})`, isExt()); return _sto.call(window,fn,delay,...a); };
  window.setInterval = function(fn, delay, ...a) { push('timers', `setInterval(delay=${delay}, fn=${safe(fn,60)})`, isExt()); return _siv.call(window,fn,delay,...a); };

  // addEventListener
  const _ae = EventTarget.prototype.addEventListener;
  EventTarget.prototype.addEventListener = function(type, fn, opts) {
    const target = this===window?'window':this===document?'document':(this.tagName?`<${this.tagName.toLowerCase()}>`:'?');
    push('events', `${target}.on("${type}", ${typeof fn==='function'?fn.name||'anon':'?'})`, isExt());
    return _ae.call(this,type,fn,opts);
  };

  // createElement / appendChild
  const _ce = document.createElement.bind(document);
  document.createElement = function(tag,...a) {
    const ext = isExt();
    if (ext || ['script','iframe','link'].includes(tag.toLowerCase())) push('dom', `createElement(${tag.toUpperCase()})`, ext);
    return _ce(tag,...a);
  };

  // History
  const _ps = history.pushState.bind(history), _rs = history.replaceState.bind(history);
  history.pushState = function(s,t,url) { push('nav', `pushState → ${url}`); return _ps(s,t,url); };
  history.replaceState = function(s,t,url) { push('nav', `replaceState → ${url}`); return _rs(s,t,url); };

  // eval
  const _eval = window.eval;
  window.eval = function(code) { push('eval', `eval(${safe(code,80)})`); return _eval(code); };
  Object.defineProperty(window.eval,'toString',{value:()=>'function eval() { [native code] }'});

})();
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap');
:root {
  --bg: #030508; --panel: #07111a; --border: #102030;
  --cyan: #00e5ff; --green: #39ff14; --red: #ff3e6c; --warn: #ffaa00; --dim: #3a5568; --text: #9fc8d8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 12px; padding: 16px; }

h1 { font-family: 'Orbitron'; font-size: 18px; color: var(--cyan); text-shadow: 0 0 14px var(--cyan); letter-spacing: .1em; margin-bottom: 4px; }
.sub { color: var(--dim); font-size: 10px; letter-spacing: .3em; margin-bottom: 14px; }

/* top row */
.top { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.btn { font-family: 'Share Tech Mono'; font-size: 11px; padding: 7px 14px; border: 1px solid; background: transparent; cursor: pointer; letter-spacing: .06em; text-transform: uppercase; transition: all .15s; }
.btn-c { color: var(--cyan); border-color: var(--cyan); } .btn-c:hover { background: rgba(0,229,255,.08); }
.btn-g { color: var(--green); border-color: var(--green); } .btn-g:hover { background: rgba(57,255,20,.08); }
.btn-r { color: var(--red); border-color: var(--red); } .btn-r:hover { background: rgba(255,62,108,.08); }
.verdict { font-family: 'Orbitron'; font-size: 13px; padding: 6px 16px; border: 2px solid; letter-spacing: .08em; }
.v-wait { color: var(--warn); border-color: var(--warn); }
.v-hit  { color: var(--green); border-color: var(--green); text-shadow: 0 0 8px var(--green); animation: gp .9s infinite; }
.v-miss { color: var(--dim); border-color: var(--dim); }
@keyframes gp { 0%,100%{box-shadow:0 0 4px var(--green)} 50%{box-shadow:0 0 14px var(--green)} }

/* layout */
.layout { display: grid; grid-template-columns: 1fr 400px; gap: 12px; }
@media(max-width:900px){ .layout{ grid-template-columns:1fr; } }

/* checks */
.checks { display: flex; flex-direction: column; gap: 8px; }
.section { background: var(--panel); border: 1px solid var(--border); }
.sec-head { display: flex; justify-content: space-between; align-items: center; padding: 7px 11px; border-bottom: 1px solid var(--border); background: rgba(0,229,255,.03); }
.sec-title { font-family: 'Orbitron'; font-size: 9px; color: var(--cyan); letter-spacing: .12em; }
.sec-ct { font-size: 10px; color: var(--dim); }
.rows { padding: 4px 0; }
.row { display: flex; align-items: center; gap: 8px; padding: 4px 11px; border-bottom: 1px solid rgba(16,32,48,.5); }
.row:last-child { border-bottom: none; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-p { background: var(--warn); }
.dot-h { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot-m { background: var(--dim); }
.dot-r { background: var(--cyan); animation: spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.rname { flex:1; color: var(--text); }
.rdetail { font-size: 10px; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rdetail.h { color: var(--green); }
.rdetail.m { color: var(--dim); }

/* interceptor panel */
.int-panel { background: var(--panel); border: 1px solid var(--border); border-left: 2px solid var(--red); display: flex; flex-direction: column; max-height: 680px; position: sticky; top: 10px; }
.int-head { display: flex; align-items: center; justify-content: space-between; padding: 7px 11px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.int-title { font-family: 'Orbitron'; font-size: 9px; color: var(--red); letter-spacing: .12em; }
.tabs { display: flex; flex-wrap: wrap; gap: 2px; padding: 6px 8px 0; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab { font-size: 9px; padding: 3px 8px; border: 1px solid var(--border); background: transparent; color: var(--dim); cursor: pointer; font-family: 'Share Tech Mono'; transition: all .12s; }
.tab:hover { color: var(--text); }
.tab.on { color: var(--red); border-color: var(--red); background: rgba(255,62,108,.05); }
.tab .ct { margin-left: 4px; font-size: 8px; background: var(--dim); color: #000; padding: 0 3px; border-radius: 8px; }
.tab.on .ct { background: var(--red); }
.feeds { flex: 1; overflow: hidden; min-height: 0; }
.feed { display: none; height: 100%; overflow-y: auto; padding: 4px 0; }
.feed.on { display: block; }
.feed::-webkit-scrollbar { width: 3px; }
.feed::-webkit-scrollbar-thumb { background: var(--border); }
.frow { display: grid; grid-template-columns: 50px 1fr; padding: 3px 10px; border-bottom: 1px solid rgba(16,32,48,.5); animation: fi .15s; }
@keyframes fi { from{opacity:0;transform:translateX(-3px)} to{opacity:1;transform:none} }
.frow.ext { border-left: 2px solid var(--red); background: rgba(255,62,108,.04); }
.fts { color: var(--dim); font-size: 9px; padding-top: 1px; }
.fmsg { word-break: break-all; font-size: 10.5px; }
.fmsg.console { color: var(--text); }
.fmsg.console.warn { color: var(--warn); }
.fmsg.console.error { color: var(--red); }
.fmsg.network { color: var(--cyan); }
.fmsg.storage { color: #88ffcc; }
.fmsg.gm { color: #ff88ff; }
.fmsg.timers { color: #aaffaa; }
.fmsg.events { color: #aaaaff; }
.fmsg.dom { color: #ffdd88; }
.fmsg.nav { color: #88ccff; }
.fmsg.eval { color: var(--red); }
.int-bottom { display: flex; gap: 6px; padding: 6px 9px; border-top: 1px solid var(--border); flex-shrink: 0; }
.int-search { background: transparent; border: 1px solid var(--border); color: var(--text); font-family: 'Share Tech Mono'; font-size: 10px; padding: 3px 7px; flex:1; outline: none; }
.int-search:focus { border-color: var(--red); }
.int-search::placeholder { color: var(--dim); }
.int-ct { font-size: 10px; color: var(--dim); display: flex; align-items: center; gap: 4px; }
.int-ct span { color: var(--cyan); font-weight: bold; }
</style>
</head>
<body>

<h1>◈ TM DETECTOR</h1>
<div class="sub">ACTIVE INTERCEPTORS + FINGERPRINT SCAN — v5.1</div>

<div class="top">
  <button class="btn btn-c" id="btn-scan">▶ SCAN</button>
  <button class="btn btn-g" id="btn-watch">◉ LIVE WATCH</button>
  <button class="btn btn-r" id="btn-reset">✕ RESET</button>
  <div class="verdict v-wait" id="verdict">AWAITING SCAN</div>
  <div style="margin-left:auto;color:var(--dim);font-size:10px;" id="status-text">ready</div>
</div>

<div class="layout">
  <!-- LEFT: checks -->
  <div class="checks" id="checks"></div>

  <!-- RIGHT: interceptor feed -->
  <div class="int-panel">
    <div class="int-head">
      <div class="int-title">⬡ LIVE INTERCEPT FEED</div>
      <div class="int-ct">total <span id="total-int">0</span></div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="feeds" id="feeds"></div>
    <div class="int-bottom">
      <input class="int-search" id="int-search" placeholder="filter feed…">
      <button class="btn btn-r" style="font-size:9px;padding:2px 8px;" id="btn-clr">CLR</button>
    </div>
  </div>
</div>

<script>
// ─── TEST DEFINITIONS ───────────────────────────────────────────
const CHECKS = [
  { sec: 'GM GLOBALS', rows: [
    { id:'gm_info',    name:'GM_info',              fn:()=>chkGlobal('GM_info') },
    { id:'gm_set',     name:'GM_setValue',          fn:()=>chkGlobal('GM_setValue') },
    { id:'gm_get',     name:'GM_getValue',          fn:()=>chkGlobal('GM_getValue') },
    { id:'gm_xhr',     name:'GM_xmlhttpRequest',    fn:()=>chkGlobal('GM_xmlhttpRequest') },
    { id:'gm_notif',   name:'GM_notification',      fn:()=>chkGlobal('GM_notification') },
    { id:'gm_style',   name:'GM_addStyle',          fn:()=>chkGlobal('GM_addStyle') },
    { id:'gm4',        name:'GM.xmlHttpRequest',    fn:()=>{ const g=chkGlobal('GM'); return {found:g.found&&typeof window.GM?.xmlHttpRequest==='function',detail:g.detail}; }},
    { id:'unsafe',     name:'unsafeWindow',         fn:()=>chkGlobal('unsafeWindow') },
    { id:'exportFn',   name:'exportFunction',       fn:()=>chkGlobal('exportFunction') },
    { id:'gm_calls',   name:'GM intercepts so far', fn:()=>{ const c=window.__LOG__.filter(l=>l.type==='gm').length; return {found:c>0,detail:`${c} calls`}; } },
  ]},
  { sec: 'DOM INJECTION', rows: [
    { id:'dom_tm',     name:'.tm-* class elements', fn:()=>domQ('[class*="tm-"]') },
    { id:'dom_gm',     name:'.gm-* class elements', fn:()=>domQ('[class*="gm-"]') },
    { id:'dom_ext_sc', name:'Extension <script> src',fn:()=>extScripts() },
    { id:'dom_ext_css',name:'Extension <link> href', fn:()=>extLinks() },
    { id:'dom_zindex', name:'Fixed overlay z>9000',  fn:()=>highZ() },
    { id:'dom_shadow', name:'Open shadowRoot',        fn:()=>shadowRoots() },
    { id:'dom_iframe', name:'Extension iframe',       fn:()=>extIframes() },
  ]},
  { sec: 'HOOKS & PATCHES', rows: [
    { id:'h_defprop',  name:'Object.defineProperty', fn:()=>nativeChk(Object.defineProperty) },
    { id:'h_fetch',    name:'fetch() original native',fn:()=>nativeChk(window.__orig_fetch__||window.fetch) },
    { id:'h_xhr',      name:'XHR.open original',      fn:()=>nativeStr(XMLHttpRequest.prototype.open) },
    { id:'h_fn_tostr', name:'Function.toString',      fn:()=>fnToStr() },
    { id:'h_json',     name:'JSON.parse native',       fn:()=>nativeChk(JSON.parse) },
    { id:'h_eval',     name:'eval() native',           fn:()=>nativeStr(window.eval) },
    { id:'h_ls',       name:'localStorage.setItem',   fn:()=>nativeStr(Storage.prototype.setItem) },
    { id:'h_cookie',   name:'document.cookie native',  fn:()=>cookieChk() },
  ]},
  { sec: 'STORAGE KEYS', rows: [
    { id:'ls_tm',      name:'localStorage TM keys',   fn:()=>storeKeys(localStorage,'tampermonkey','tm_','gm_','userscript') },
    { id:'ss_tm',      name:'sessionStorage TM keys', fn:()=>storeKeys(sessionStorage,'tampermonkey','tm_','gm_') },
    { id:'idb_tm',     name:'IndexedDB TM databases', fn:()=>idbChk() },
  ]},
  { sec: 'LIVE INTERCEPTS', rows: [
    { id:'int_net',    name:'Network requests seen',  fn:()=>intCount('network') },
    { id:'int_store',  name:'Storage ops seen',        fn:()=>intCount('storage') },
    { id:'int_timer',  name:'Timers registered',       fn:()=>intCount('timers') },
    { id:'int_eval',   name:'eval() calls',            fn:()=>intCount('eval') },
    { id:'int_extori', name:'Extension-origin calls',  fn:()=>extOriginCalls() },
    { id:'int_extcre', name:'Extension createElement', fn:()=>extCreateEl() },
  ]},
];

// ─── HELPERS ────────────────────────────────────────────────────
const chkGlobal = name => { try { const v=window[name]; return v!=null?{found:true,detail:`${typeof v}`}:{found:false,detail:'–'}; } catch(e){return{found:false,detail:e.message};} };
const domQ = sel => { try { const n=document.querySelectorAll(sel).length; return n?{found:true,detail:`${n} el`}:{found:false,detail:'0'}; } catch(e){return{found:false,detail:e.message};} };
const extScripts = () => { for(const s of document.querySelectorAll('script[src]')){ const h=s.src; if(h.startsWith('chrome-extension://')||h.startsWith('moz-extension://')) return {found:true,detail:h.slice(0,50)}; } return {found:false,detail:'none'}; };
const extLinks   = () => { for(const l of document.querySelectorAll('link')){ const h=l.href||''; if(h.startsWith('chrome-extension://')||h.startsWith('moz-extension://')) return {found:true,detail:h.slice(0,50)}; } return {found:false,detail:'none'}; };
const highZ      = () => { for(const el of document.querySelectorAll('*')){ const cs=getComputedStyle(el); if(cs.position==='fixed'&&parseInt(cs.zIndex)>9000) return {found:true,detail:`${el.tagName} z=${cs.zIndex}`}; } return {found:false,detail:'none'}; };
const shadowRoots= () => { let c=0; for(const el of document.querySelectorAll('*')) if(el.shadowRoot) c++; return c?{found:true,detail:`${c} roots`}:{found:false,detail:'none'}; };
const extIframes  = () => { for(const f of document.querySelectorAll('iframe')){ const s=f.src||''; if(s.startsWith('chrome-extension://')||s.startsWith('moz-extension://')) return {found:true,detail:s.slice(0,50)}; } return {found:false,detail:'none'}; };
const nativeChk  = fn => { try { const s=Function.prototype.toString.call(fn); return !s.includes('[native code]')?{found:true,detail:'WRAPPED'}:{found:false,detail:'native'}; } catch(e){return{found:false,detail:e.message};} };
const nativeStr  = fn => nativeChk(fn);
const fnToStr    = () => { try { const s=Function.prototype.toString.call(Function.prototype.toString); return !s.includes('[native code]')?{found:true,detail:'toString PATCHED'}:{found:false,detail:'native'}; } catch(e){return{found:false,detail:e.message};} };
const cookieChk  = () => { try { const d=Object.getOwnPropertyDescriptor(Document.prototype,'cookie')||Object.getOwnPropertyDescriptor(HTMLDocument.prototype,'cookie'); if(!d) return {found:true,detail:'descriptor gone'}; const s=Function.prototype.toString.call(d.get); return !s.includes('[native code]')?{found:true,detail:'getter WRAPPED'}:{found:false,detail:'native'}; } catch(e){return{found:false,detail:e.message};} };
const storeKeys  = (store, ...pats) => { try { const k=Object.keys(store); const m=k.filter(k=>pats.some(p=>k.toLowerCase().includes(p))); return m.length?{found:true,detail:m.slice(0,3).join(', ')}:{found:false,detail:`${k.length} keys`}; } catch(e){return{found:false,detail:e.message};} };
const idbChk     = () => new Promise(res=>{ try { const r=indexedDB.databases?.(); if(r) r.then(dbs=>{ const t=dbs.filter(d=>d.name&&(d.name.toLowerCase().includes('tamper')||d.name.toLowerCase().includes('grease'))); res(t.length?{found:true,detail:t.map(d=>d.name).join(', ')}:{found:false,detail:`${dbs.length} dbs`}); }).catch(()=>res({found:false,detail:'no access'})); else res({found:false,detail:'n/a'}); } catch(e){res({found:false,detail:e.message});} });
const intCount   = type => { const c=window.__LOG__.filter(l=>l.type===type).length; return {found:c>0,detail:`${c} calls`}; };
const extOriginCalls = () => { const c=window.__LOG__.filter(l=>l.ext).length; return c?{found:true,detail:`${c} ext calls`}:{found:false,detail:'0'}; };
const extCreateEl    = () => { const c=window.__LOG__.filter(l=>l.type==='dom'&&l.ext).length; return c?{found:true,detail:`${c} ext elements`}:{found:false,detail:'0'}; };

// ─── INTERCEPTOR FEED UI ────────────────────────────────────────
const CHANS = ['console','network','storage','gm','timers','events','dom','nav','eval'];
const chanCounts = {};
CHANS.forEach(c => chanCounts[c] = 0);

let activeTab = 'console';
let filterText = '';

// Build tabs + feeds
const tabsEl = document.getElementById('tabs');
const feedsEl = document.getElementById('feeds');
CHANS.forEach(ch => {
  const tab = document.createElement('button');
  tab.className = 'tab' + (ch === activeTab ? ' on' : '');
  tab.dataset.ch = ch;
  tab.innerHTML = `${ch.toUpperCase()}<span class="ct" id="ct-${ch}">0</span>`;
  tab.onclick = () => switchTab(ch);
  tabsEl.appendChild(tab);

  const feed = document.createElement('div');
  feed.className = 'feed' + (ch === activeTab ? ' on' : '');
  feed.id = 'feed-' + ch;
  feedsEl.appendChild(feed);
});

function switchTab(ch) {
  activeTab = ch;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.ch === ch));
  document.querySelectorAll('.feed').forEach(f => f.classList.toggle('on', f.id === 'feed-'+ch));
}

let totalIntercepts = 0;
function addFeedRow(entry) {
  totalIntercepts++;
  document.getElementById('total-int').textContent = totalIntercepts;

  const ch = entry.type;
  if (!CHANS.includes(ch)) return;

  chanCounts[ch] = (chanCounts[ch]||0)+1;
  const ctEl = document.getElementById('ct-'+ch);
  if (ctEl) { ctEl.textContent = chanCounts[ch] > 99 ? '99+' : chanCounts[ch]; }

  if (filterText && !entry.msg.toLowerCase().includes(filterText)) return;

  const feed = document.getElementById('feed-'+ch);
  if (!feed) return;

  // Determine sub-type for coloring
  const subtype = ch === 'console' ? (entry.msg.includes('console.warn')?'warn':entry.msg.includes('console.error')?'error':'') : '';

  const row = document.createElement('div');
  row.className = 'frow' + (entry.ext ? ' ext' : '');
  row.innerHTML = `<div class="fts">${parseFloat(entry.t).toFixed(0)}ms</div><div class="fmsg ${ch} ${subtype}">${escH(entry.msg)}</div>`;
  feed.appendChild(row);

  // Auto-scroll
  if (document.getElementById('chk-auto')?.checked !== false) {
    feed.scrollTop = feed.scrollHeight;
  }

  // Trim to 200 rows per feed
  while (feed.children.length > 200) feed.removeChild(feed.firstChild);
}

window.addEventListener('__log__', e => addFeedRow(e.detail));

// ─── CHECKS UI ──────────────────────────────────────────────────
function buildChecks() {
  const el = document.getElementById('checks');
  el.innerHTML = '';
  let total = 0;
  CHECKS.forEach(sec => {
    total += sec.rows.length;
    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = `
      <div class="sec-head">
        <span class="sec-title">${sec.sec}</span>
        <span class="sec-ct" id="sct-${sec.sec.replace(/\s/g,'-')}">0/${sec.rows.length}</span>
      </div>
      <div class="rows" id="sec-${sec.sec.replace(/\s/g,'-')}">
        ${sec.rows.map(r => rowHTML(r.id, r.name, 'p', '')).join('')}
      </div>`;
    el.appendChild(div);
  });
  return total;
}

function rowHTML(id, name, state, detail) {
  const dot = state==='p'?'dot-p':state==='h'?'dot-h':state==='r'?'dot-r':'dot-m';
  const dc  = state==='h'?'h':'m';
  return `<div class="row" id="row-${id}">
    <div class="dot ${dot}" id="dot-${id}"></div>
    <div class="rname">${escH(name)}</div>
    <div class="rdetail ${dc}" id="det-${id}">${escH(detail)}</div>
  </div>`;
}

function updateRow(id, state, detail) {
  const dot = document.getElementById('dot-'+id);
  const det = document.getElementById('det-'+id);
  if (!dot || !det) return;
  dot.className = 'dot ' + (state==='h'?'dot-h':state==='r'?'dot-r':'dot-m');
  det.className = 'rdetail ' + (state==='h'?'h':'m');
  det.textContent = detail||'';
}

function updateSecCount(secName) {
  const sec = CHECKS.find(s=>s.sec===secName);
  if (!sec) return;
  const found = sec.rows.filter(r => state.results[r.id]?.found).length;
  const el = document.getElementById('sct-'+secName.replace(/\s/g,'-'));
  if (el) el.textContent = `${found}/${sec.rows.length}`;
}

// ─── SCAN STATE ──────────────────────────────────────────────────
const state = { results:{}, running:false, watchObs:null, watchPoll:null };

async function runScan() {
  if (state.running) return;
  state.running = true;
  state.results = {};
  buildChecks();
  let total=0, found=0, done=0;
  const allRows = CHECKS.flatMap(s => s.rows.map(r=>({...r,sec:s.sec})));
  allRows.forEach(r=>{total++;});
  setStatus(`scanning 0/${total}…`);
  setVerdict('wait');

  for (const r of allRows) {
    updateRow(r.id,'r','…');
    let res;
    try { const raw=r.fn(); res = raw instanceof Promise ? await raw : raw; }
    catch(e) { res={found:false,detail:e.message}; }
    state.results[r.id]=res;
    updateRow(r.id, res.found?'h':'m', res.detail||'');
    updateSecCount(r.sec);
    done++;
    if(res.found) found++;
    setStatus(`${done}/${total} — ${found} hit${found!==1?'s':''}`);
    setVerdict(done<total?'wait':found>0?'hit':'miss');
    await sleep(6);
  }
  setStatus(`complete — ${found}/${total} signals`);
  state.running=false;
}

function setStatus(s) { document.getElementById('status-text').textContent=s; }
function setVerdict(v) {
  const el=document.getElementById('verdict');
  if(v==='wait') { el.className='verdict v-wait'; el.textContent='SCANNING…'; }
  else if(v==='hit') { el.className='verdict v-hit'; el.textContent='⚡ DETECTED'; }
  else { el.className='verdict v-miss'; el.textContent='✕ CLEAN'; }
}

// ─── LIVE WATCH ──────────────────────────────────────────────────
let watchOn=false;
function toggleWatch() {
  watchOn=!watchOn;
  const btn=document.getElementById('btn-watch');
  if(watchOn) {
    btn.textContent='◉ STOP WATCH'; btn.className='btn btn-r';
    state.watchObs=new MutationObserver(muts=>{
      for(const m of muts) for(const n of m.addedNodes) if(n.nodeType===1) {
        const tag=n.tagName||'?', cls=String(n.className||''), id=n.id||'';
        if(['SCRIPT','IFRAME','LINK'].includes(tag)||cls.includes('tm-')||id.includes('tm-')) {
          window.__LOG__.push({t:performance.now().toFixed(1),type:'dom',msg:`DOM inject: <${tag}${id?'#'+id:''}${cls?' .'+cls.split(' ')[0]:''}>`});
          window.dispatchEvent(new CustomEvent('__log__',{detail:window.__LOG__[window.__LOG__.length-1]}));
        }
      }
    });
    state.watchObs.observe(document.documentElement,{childList:true,subtree:true});
    state.watchPoll=setInterval(()=>{
      ['GM_info','GM_setValue','GM_getValue','unsafeWindow'].forEach(g=>{
        if(window[g]!==undefined&&!state._seen?.[g]){
          state._seen=state._seen||{};state._seen[g]=1;
          window.__LOG__.push({t:performance.now().toFixed(1),type:'gm',msg:`APPEARED: window.${g}`,ext:false});
          window.dispatchEvent(new CustomEvent('__log__',{detail:window.__LOG__[window.__LOG__.length-1]}));
        }
      });
    },400);
  } else {
    btn.textContent='◉ LIVE WATCH'; btn.className='btn btn-g';
    state.watchObs?.disconnect(); clearInterval(state.watchPoll);
  }
}

// ─── CONTROLS ────────────────────────────────────────────────────
document.getElementById('btn-scan').onclick = runScan;
document.getElementById('btn-watch').onclick = toggleWatch;
document.getElementById('btn-reset').onclick = ()=>{
  if(state.running) return;
  if(watchOn) toggleWatch();
  state.results={};
  buildChecks();
  setStatus('ready'); setVerdict('wait');
};
document.getElementById('btn-clr').onclick = ()=>{
  CHANS.forEach(ch=>{ const f=document.getElementById('feed-'+ch); if(f) f.innerHTML=''; chanCounts[ch]=0; const c=document.getElementById('ct-'+ch); if(c) c.textContent='0'; });
  totalIntercepts=0; document.getElementById('total-int').textContent='0';
  window.__LOG__=[];
};
document.getElementById('int-search').oninput = function() {
  filterText=this.value.toLowerCase();
};

// ─── UTILS ───────────────────────────────────────────────────────
const escH = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const sleep = ms => new Promise(r=>setTimeout(r,ms));

// ─── INIT ────────────────────────────────────────────────────────
buildChecks();
// Replay any intercepts that fired before the feed was built
window.__LOG__.forEach(addFeedRow);
</script>
